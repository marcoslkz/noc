version: '3.8'

services:
  minio:
    image: minio/minio
    container_name: noc-minio
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    networks:
      - proxy-default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=Host(`minio.exemplo.com.br`)"
      - "traefik.http.routers.minio.entrypoints=websecure"
      - "traefik.http.routers.minio.tls=true"
      - "traefik.http.services.minio.loadbalancer.server.port=9000"

  mimir:
    image: grafana/mimir:latest
    container_name: noc-mimir
    command: ["-config.file=/etc/mimir/config.yaml"]
    volumes:
      - ./mimir/config.yaml:/etc/mimir/config.yaml
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    depends_on:
      - minio
    networks:
      - proxy-default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mimir.rule=Host(`${MIMIR_DOMAIN}`)"
      - "traefik.http.routers.mimir.entrypoints=websecure"
      - "traefik.http.routers.mimir.tls=true"
      - "traefik.http.services.mimir.loadbalancer.server.port=8080"

  loki:
    image: grafana/loki:latest
    container_name: noc-loki
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml
    depends_on:
      - minio
    networks:
      - proxy-default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.loki.rule=Host(`${LOKI_DOMAIN}`)"
      - "traefik.http.routers.loki.entrypoints=websecure"
      - "traefik.http.routers.loki.tls=true"
      - "traefik.http.services.loki.loadbalancer.server.port=3100"

  grafana:
    image: grafana/grafana:latest
    container_name: noc-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - mimir
      - loki
    networks:
      - proxy-default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

networks:
  proxy-default:
    external: true

volumes:
  minio_data:
  grafana_data:
