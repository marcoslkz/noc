services:

  grafana:
    image: ${GRAFANA_IMAGE}
    container_name: grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    environment:
      - TZ=${TZ}
      - GF_SERVER_HTTP_PORT=${GRAFANA_PORT}
      - GF_LOG_LEVEL=${GF_LOG_LEVEL}
      - GF_SMTP_ENABLED=${GF_SMTP_ENABLED}
      - GF_SMTP_HOST=${GF_SMTP_HOST}
      - GF_SMTP_FROM_ADDRESS=${GF_SMTP_FROM_ADDRESS}
      - GF_SMTP_FROM_NAME=${GF_SMTP_FROM_NAME}
      - GF_SMTP_SKIP_VERIFY=${GF_SMTP_SKIP_VERIFY}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${GRAFANA_PORT}/api/health | grep -q ok"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy_default
      - traefik.http.services.grafana.loadbalancer.server.port=${GRAFANA_PORT}
      - traefik.http.routers.grafana.tls.certresolver=letsencrypt
      - traefik.http.routers.grafana.tls=true
      - traefik.frontend.entryPoints=http,https
      - traefik.http.routers.grafana.rule=Host(`grafana.${SITE_PATH}.${ROOT_DOMAIN}`)
      - traefik.http.routers.grafana.middlewares=security-headers@file
    networks:
      - proxy_default
      - monitoring
    volumes:
      - ${BASE_DIR}/grafana:/var/lib/grafana
      - ${BASE_DIR_CONF}/grafana/provisioning:/etc/grafana/provisioning:ro

  prometheus:
    image: ${PROMETHEUS_IMAGE}
    container_name: prometheus
    restart: unless-stopped
    environment:
      - TZ=${TZ}
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION}
      - --web.enable-remote-write-receiver
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy | grep -q Healthy"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    labels:
      - traefik.enable=false
    networks:
      - monitoring
    volumes:
      - ${BASE_DIR}/prometheus:/prometheus
      - ${BASE_DIR_CONF}/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  loki:
    image: ${LOKI_IMAGE}
    container_name: loki
    restart: unless-stopped
    environment:
      - TZ=${TZ}
    command:
      - -config.file=/etc/loki/loki-config.yml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready | grep -q ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - traefik.enable=false
    networks:
      - monitoring
    volumes:
      - ${BASE_DIR}/loki:/loki
      - ${BASE_DIR_CONF}/loki/loki-config.yml:/etc/loki/loki-config.yml:ro

  alloy:
    image: ${ALLOY_IMAGE}
    container_name: alloy
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    environment:
      - TZ=${TZ}
      - CUSTOM_HOSTNAME=${CUSTOM_HOSTNAME}
      - LOKI_PUSH_URL=${LOKI_PUSH_URL}
      - ALLOY_SYSLOG_PORT=${ALLOY_SYSLOG_PORT}
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:12345/-/ready | grep -q ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    labels:
      - traefik.enable=false
    networks:
      - monitoring
    ports:
      - ${ALLOY_SYSLOG_PORT}:${ALLOY_SYSLOG_PORT}/tcp
      - ${ALLOY_SYSLOG_PORT}:${ALLOY_SYSLOG_PORT}/udp
    volumes:
      - ${BASE_DIR_CONF}/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - ${BASE_DIR}/alloy:/var/lib/alloy
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /:/rootfs:ro

  syslog-ng:
    image: ${SYSLOG_NG_IMAGE}
    container_name: syslog-ng
    restart: unless-stopped
    depends_on:
      alloy:
        condition: service_healthy
    environment:
      - TZ=${TZ}
    labels:
      - traefik.enable=false
    networks:
      - monitoring
    ports:
      - ${SYSLOG_NG_PORT}:${SYSLOG_NG_PORT}/tcp
      - ${SYSLOG_NG_PORT}:${SYSLOG_NG_PORT}/udp
    volumes:
      - ${BASE_DIR_CONF}/syslog-ng/syslog-ng.conf:/etc/syslog-ng/syslog-ng.conf:ro
      - ${BASE_DIR}/syslog-ng:/var/lib/syslog-ng

networks:
  proxy_default:
    external: true
  monitoring:
    name: monitoring
